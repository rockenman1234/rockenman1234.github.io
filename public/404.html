<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#a8a8a8" />
  <link rel="shortcut icon" type="image/png" href="/images/favicon.ico" />
  <title>404 | Alex Jenkins</title>
  <style>
    @font-face {
      font-family: "ChicagoFLF";
      src: url("/fonts/ChicagoFLF.woff2") format("woff2"),
        url("/fonts/ChicagoFLF.woff") format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: block;
    }

    @font-face {
      font-family: "Chicago_12";
      src: url("/fonts/ChiKareGo2.woff2") format("woff2"),
        url("/fonts/ChiKareGo2.woff") format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: block;
    }

    :root {
      --black: #000;
      --white: #fff;
      --desktop-gray: #a8a8a8;
      --desktop-dot: #a0a0a0;
      --window-gray: #d9d9d9;
      --menu-height: 21px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "ChicagoFLF", "Chicago", "Geneva", sans-serif;
      font-size: 16px;
      color: var(--black);
      -webkit-font-smoothing: none;
      text-rendering: geometricPrecision;
      font-smooth: never;
    }

    body {
      background-color: var(--desktop-gray);
      background-image:
        linear-gradient(45deg, var(--desktop-dot) 25%, transparent 25%),
        linear-gradient(-45deg, var(--desktop-dot) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, var(--desktop-dot) 75%),
        linear-gradient(-45deg, transparent 75%, var(--desktop-dot) 75%);
      background-size: 4px 4px;
      background-position: 0 0, 0 2px, 2px -2px, -2px 0;
      overflow: hidden;
    }

    .menu-bar-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      background: #fff;
      border-bottom: 1px solid #000;
      height: 21px;
      padding: 0;
    }

    ul[role="menu-bar"] {
      flex: 1;
      height: 100%;
      display: flex;
      align-items: stretch;
      list-style: none;
      margin: 0;
      padding: 0;
      font-family: "Chicago_12", "Geneva", sans-serif;
      font-size: 14px;
      background: #fff;
    }

    ul[role="menu-bar"] > [role="menu-item"] {
      padding: 0 10px !important;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      height: auto;
      font-size: 14px;
      position: relative;
      cursor: default;
    }

    ul[role="menu-bar"] > [role="menu-item"]:hover {
      background: #000;
      color: #fff;
    }

    ul[role="menu-bar"] > [role="menu-item"].apple-menu:hover .apple {
      filter: invert(1);
    }

    .menu-bar-right {
      padding-right: 12px;
      font-size: 14px;
      font-family: "Chicago_12", "Geneva", sans-serif;
      white-space: nowrap;
      display: flex;
      align-items: center;
      -webkit-font-smoothing: none;
      font-smooth: never;
      text-rendering: geometricPrecision;
    }

    .menu-bar-clock {
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .menu-meridiem {
      font-family: inherit;
      font-size: inherit;
      font-weight: inherit;
      line-height: inherit;
      letter-spacing: inherit;
    }

    .apple-menu {
      font-family: "Chicago_12", "Geneva", sans-serif;
      font-weight: bold;
    }

    .apple {
      background: url("data:image/svg+xml;charset=utf-8,%3Csvg width='18' height='22' viewBox='0 0 9 11' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M5 0h2v1H5zM4 1h2v1H4zM4 2h1v1H4zM1 3h3v1H1zM5 3h3v1H5zM0 4h9v1H0zM0 5h7v2H0zM0 7h9v2H0zM1 9h7v1H1zM2 10h2v1H2zM5 10h2v1H5z'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-size: contain !important;
      background-position: center !important;
      border: none;
      display: block;
      height: 15px !important;
      width: 14px !important;
      margin-right: 0 !important;
      position: relative;
      top: -1px;
    }

    main {
      min-height: 100vh;
      padding: calc(21px + 32px) 18px 24px;
      display: grid;
      place-items: start center;
    }

    .alert-outer {
      width: min(760px, 100%);
      border: 2px solid var(--black);
      background: var(--window-gray);
      box-shadow: 1px 1px 0 var(--black);
      padding: 4px;
    }

    .alert-inner {
      border: 4px solid var(--black);
      padding: 28px 30px 18px;
      min-height: 218px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
    }

    .alert-content {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .icon-wrap {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .alert-text {
      margin: 0;
      font-size: 20px;
      line-height: 1.35;
      letter-spacing: 0;
      max-width: 30ch;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
    }

    .ok-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 98px;
      height: 32px;
      padding: 0 16px;
      border: 2px solid var(--black);
      border-radius: 7px;
      background: #f4f4f4;
      color: var(--black);
      text-decoration: none;
      font-size: 18px;
      line-height: 1;
      box-shadow: inset 1px 1px 0 var(--white), inset -1px -1px 0 #8f8f8f;
    }

    .ok-button:hover,
    .ok-button:focus-visible {
      background: #ebebeb;
      outline: 2px solid var(--black);
      outline-offset: 1px;
    }

    .ok-button:active {
      box-shadow: inset -1px -1px 0 var(--white), inset 1px 1px 0 #8f8f8f;
      transform: translateY(1px);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 800px) {
      .alert-inner {
        min-height: auto;
      }

      .alert-text {
        font-size: 18px;
      }

      .ok-button {
        min-width: 88px;
        height: 30px;
        font-size: 17px;
      }
    }

    @media (max-width: 600px) {
      .menu-bar-right {
        display: none;
      }
    }

    @media (max-width: 560px) {
      ul[role="menu-bar"] > [role="menu-item"] {
        padding: 0 8px !important; /* Adding !important to override the previous !important */
        font-size: 12px;
      }

      .alert-inner {
        padding: 18px 16px 14px;
      }

      .alert-content {
        gap: 12px;
      }

      .icon-wrap {
        width: 48px;
        height: 48px;
      }

      .alert-text {
        font-size: 16px;
      }

      .ok-button {
        min-width: 82px;
        height: 29px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <nav class="menu-bar-wrapper" id="top">
    <ul role="menu-bar">
      <li role="menu-item" tabindex="0" aria-haspopup="false" class="apple-menu">
        <span role="img" class="apple" aria-label="Apple"></span>
      </li>
      <li role="menu-item" tabindex="0" aria-haspopup="false">
        File
      </li>
      <li role="menu-item" tabindex="0" aria-haspopup="false">
        Edit
      </li>
      <li role="menu-item" tabindex="0" aria-haspopup="false">
        Special
      </li>
    </ul>
    <div class="menu-bar-right">
      <span class="menu-bar-clock" id="menuClock"></span>
    </div>
  </nav>

  <main>
    <section class="alert-outer" role="alertdialog" aria-labelledby="error-title" aria-describedby="error-message">
      <div class="alert-inner">
        <div class="alert-content">
          <div class="icon-wrap" aria-hidden="true">
            <img src="/error.webp" alt="" width="58" height="58" style="display: block;" />
          </div>
          <div>
            <h1 id="error-title" class="sr-only">404 Error</h1>
            <p id="error-message" class="alert-text">
              This page could not be found.<br><br>Error 404.
            </p>
          </div>
        </div>

        <div class="actions">
          <a class="ok-button" href="/index.html" aria-label="Return to home page">OK</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    function updateClock() {
      const clock = document.getElementById('menuClock');
      if (!clock) return;
      const now = new Date();
      const hours = now.getHours();
      const minutes = now.getMinutes().toString().padStart(2, '0');
      const ampm = hours >= 12 ? 'PM' : 'AM';
      const displayHours = hours % 12 || 12;
      // Render meridiem in a dedicated span so we can control its glyph rendering.
      clock.innerHTML = `${displayHours}:${minutes} <span class="menu-meridiem">${ampm}</span>`;
    }

    updateClock();
    setInterval(updateClock, 30000);
  </script>
</body>
</html>
